services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: realTimeDocs
      POSTGRES_PASSWORD: realTimeDocs
      POSTGRES_DB: realTimeDocs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
      
volumes:
  postgres_data: